# A string used to distinguish different Supabase projects on the same host. Defaults to the working directory name when running `supabase init`.
project_id = "abbhqglzswbrpstndyrl"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[edge_runtime]
enabled = true
port = 54324

[auth]
enabled = true
port = 54327
issuer = "supabase"
jwt_expiry = 3600
enable_signup = true

[storage]
enabled = true
port = 54323
file_size_limit = "50MiB"
